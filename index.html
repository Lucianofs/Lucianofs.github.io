    <!-- SCRIPT DE CAPTURA DE UTM (INTELIGÊNCIA DE TRÁFEGO) -->
    <script>
      (function() {
        try {
          const urlParams = new URLSearchParams(window.location.search);
          const utms = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
          let hasUtm = false;
          
          utms.forEach(utm => {
            const value = urlParams.get(utm);
            if (value) {
              sessionStorage.setItem(utm, value);
              hasUtm = true;
            }
          });
          
          if (hasUtm) {
            console.log('🚀 UTMs capturadas e armazenadas para o relatório SAIAM.');
          }
        } catch (e) {
          console.warn('⚠️ Não foi possível armazenar UTMs (SessionStorage bloqueado).');
        }
      })();
    </script>
